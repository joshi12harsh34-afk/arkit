workflows:
  ios-build:
    name: iOS Build (Unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "WarehouseApp.xcodeproj"
        XCODE_SCHEME: "WarehouseApp"
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
          
      - name: Generate Xcode Project
        script: |
          xcodegen generate
          
      - name: Build Unsigned App
        script: |
          xcodebuild build \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/build
            
      - name: Package to IPA
        script: |
          mkdir -p $CM_BUILD_DIR/Payload
          mv $CM_BUILD_DIR/build/$XCODE_SCHEME.app $CM_BUILD_DIR/Payload/
          cd $CM_BUILD_DIR
          zip -qr WarehouseApp.ipa Payload
          
    artifacts:
      - $CM_BUILD_DIR/*.ipa
